<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>NapkinPlot</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/caveat@5/index.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:wght@400;600&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Caveat','Comic Sans MS',cursive;
  height:100vh;overflow:hidden;
  /* 50s diner cherry red — think vinyl booth, not merlot */
  background-color: #c0251a;
}
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;
  /* first layer: smaller silver-white flecks scattered across the whole surface */
  background-image:
    radial-gradient(ellipse 1.5px 2px   at 7%  14%, rgba(255,255,240,0.9)  0%, transparent 100%),
    radial-gradient(ellipse 2px 1.5px   at 18% 67%, rgba(255,255,255,0.8)  0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 27% 38%, rgba(255,240,160,0.85) 0%, transparent 100%),
    radial-gradient(ellipse 1.5px 2px   at 34% 82%, rgba(255,255,255,0.9)  0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 43% 22%, rgba(255,255,240,0.85) 0%, transparent 100%),
    radial-gradient(ellipse 2px 1.5px   at 51% 55%, rgba(255,240,160,0.8)  0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 59% 91%, rgba(255,255,255,0.9)  0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 67% 33%, rgba(255,255,240,0.85) 0%, transparent 100%),
    radial-gradient(ellipse 1.5px 2px   at 74% 72%, rgba(255,240,160,0.9)  0%, transparent 100%),
    radial-gradient(ellipse 2px 1.5px   at 82% 18%, rgba(255,255,255,0.8)  0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 88% 48%, rgba(255,255,240,0.85) 0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 94% 79%, rgba(255,240,160,0.9)  0%, transparent 100%),
    radial-gradient(ellipse 2px 1.5px   at 12% 91%, rgba(255,255,255,0.8)  0%, transparent 100%),
    radial-gradient(ellipse 1.5px 2px   at 63%  8%, rgba(255,255,240,0.9)  0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 39% 60%, rgba(255,240,160,0.85) 0%, transparent 100%),
    radial-gradient(ellipse 2px 1.5px   at 78% 44%, rgba(255,255,255,0.8)  0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 23% 28%, rgba(255,255,240,0.85) 0%, transparent 100%),
    radial-gradient(ellipse 1.5px 2px   at 55% 75%, rgba(255,240,160,0.9)  0%, transparent 100%),
    radial-gradient(ellipse 2px 2px     at 3%  52%, rgba(255,255,255,0.8)  0%, transparent 100%),
    radial-gradient(ellipse 2px 1.5px   at 47% 97%, rgba(255,255,240,0.85) 0%, transparent 100%);
  background-size: 100% 100%;
  animation: glitter1 4.2s ease-in-out infinite alternate;
  z-index:0;
}
body::after{
  content:'';
  position:fixed;inset:0;pointer-events:none;
  /* second layer: bigger, brighter bursts — the real showstoppers */
  background-image:
    radial-gradient(ellipse 3.5px 3px   at 22% 44%, rgba(255,255,220,1.0)  0%, transparent 100%),
    radial-gradient(ellipse 3px 3.5px   at 68% 19%, rgba(255,255,255,0.95) 0%, transparent 100%),
    radial-gradient(ellipse 4px 3px     at 84% 73%, rgba(255,245,160,1.0)  0%, transparent 100%),
    radial-gradient(ellipse 3px 4px     at 41% 88%, rgba(255,255,255,0.95) 0%, transparent 100%),
    radial-gradient(ellipse 3.5px 3px   at 7%  31%, rgba(255,255,220,1.0)  0%, transparent 100%),
    radial-gradient(ellipse 3px 3.5px   at 56% 62%, rgba(255,245,160,0.95) 0%, transparent 100%),
    radial-gradient(ellipse 4px 3px     at 31% 15%, rgba(255,255,255,0.9)  0%, transparent 100%),
    radial-gradient(ellipse 3px 3px     at 72% 85%, rgba(255,255,220,0.95) 0%, transparent 100%),
    radial-gradient(ellipse 3.5px 4px   at 91% 37%, rgba(255,245,160,1.0)  0%, transparent 100%),
    radial-gradient(ellipse 3px 3.5px   at 48%  5%, rgba(255,255,255,0.9)  0%, transparent 100%);
  background-size: 100% 100%;
  animation: glitter2 6s ease-in-out infinite alternate;
  z-index:0;
}
@keyframes glitter1{
  0%  { opacity:0.15 }
  20% { opacity:0.95 }
  40% { opacity:0.2  }
  65% { opacity:1.0  }
  85% { opacity:0.3  }
  100%{ opacity:0.8  }
}
@keyframes glitter2{
  0%  { opacity:1.0  }
  25% { opacity:0.15 }
  50% { opacity:0.9  }
  70% { opacity:0.2  }
  90% { opacity:0.85 }
  100%{ opacity:0.1  }
}
.sp{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}

/* LEFT PALETTE */
.sb{width:110px;flex-shrink:0;background:#fff;border-right:2.5px solid #222;display:flex;flex-direction:column;overflow:hidden;box-shadow:2px 0 8px rgba(0,0,0,0.25)}
.sb-hd{padding:9px 6px 8px;font-size:14px;font-weight:700;text-align:center;border-bottom:2px solid #222;line-height:1.3;flex-shrink:0;color:#111}
.sb-bd{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.pi{display:flex;flex-direction:column;align-items:center;padding:6px 4px 5px;cursor:grab;border-bottom:1px dashed #ccc;transition:background .15s;user-select:none}
.pi:hover{background:#f5f5f5}
.pi svg{filter:url(#rough);pointer-events:none;display:block}
.pi-l{font-size:11px;margin-top:2px;text-align:center;line-height:1.1;pointer-events:none;color:#111}

/* CENTER STAGE */
.main{flex:1;display:flex;flex-direction:column;padding:13px 10px 9px;gap:8px;min-width:0;overflow:hidden}
.hdr{display:flex;align-items:baseline;gap:8px;flex-shrink:0}
.hdr-t{font-size:22px;font-weight:400;flex-shrink:0;color:#f5ece0;font-family:'Pacifico',cursive;letter-spacing:0.01em}
.band{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;border:none;border-bottom:2px solid rgba(245,236,224,0.4);background:transparent;outline:none;flex:1;min-width:0;color:#f5ece0;letter-spacing:0.01em}
.cv-w-placeholder{}
.sv{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.it{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:move;padding:2px 4px;border-radius:3px;z-index:1;outline:2px solid transparent;user-select:none;touch-action:none}
.it.s{outline:2px dashed #7a6040;background:rgba(0,0,0,.03);z-index:10}
.it svg{filter:url(#rough);pointer-events:none;display:block}
.it-l{font-size:12px;text-align:center;white-space:nowrap;pointer-events:none;color:#1a1a1a;line-height:1.2;margin-top:1px}
.it-in{font-family:'Caveat','Comic Sans MS',cursive;font-size:12px;width:78px;text-align:center;border:none;border-bottom:1.5px solid #6a5a3a;background:rgba(255,254,248,.95);outline:none}
.ftr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn{font-family:'Caveat','Comic Sans MS',cursive;font-size:14px;padding:3px 13px;border:2px solid #c8a090;background:rgba(100,15,15,0.7);cursor:pointer;border-radius:2px;color:#f5ece0}
.btn:hover{background:rgba(140,30,30,0.85)}
.hint{font-size:11px;color:rgba(240,220,200,0.5);margin-left:auto;text-align:right;line-height:1.3}

/* RIGHT INPUT LIST */
.ilist{width:160px;flex-shrink:0;background:#fff;border-left:2.5px solid #222;display:flex;flex-direction:column;overflow:hidden;box-shadow:-2px 0 8px rgba(0,0,0,0.25)}
.il-hd{padding:8px 8px 7px;font-size:14px;font-weight:700;text-align:center;border-bottom:2px solid #222;flex-shrink:0;line-height:1.3;color:#111}
.il-bd{flex:1;overflow-y:auto}
.irow{display:flex;align-items:center;padding:3px 5px 3px 4px;border-bottom:1px dashed #ccc;gap:3px;min-height:27px}
.ich{width:16px;font-size:11px;color:#aaa;flex-shrink:0;text-align:right;padding-right:2px}
.iname{flex:1;border:none;background:transparent;font-family:'Caveat','Comic Sans MS',cursive;font-size:13px;outline:none;color:#111;min-width:0;padding:1px 2px}
.ityp{font-size:10px;color:#333;flex-shrink:0;cursor:pointer;padding:1px 4px;border:1px solid #ccc;border-radius:2px;background:#f0f0f0;font-family:'Caveat',cursive;white-space:nowrap;line-height:1.5}
.ityp:hover{background:#e0e0e0}
.idel{font-size:14px;color:#ccc;cursor:pointer;flex-shrink:0;padding:0 1px;line-height:1;display:none}
.irow:hover .idel{display:block}
.idel:hover{color:#333}
.il-ft{border-top:2px solid #222;padding:5px 8px;flex-shrink:0}
.iadd{font-family:'Caveat','Comic Sans MS',cursive;font-size:13px;color:#aaa;cursor:pointer;background:none;border:none;width:100%;text-align:left;padding:2px 0}
.iadd:hover{color:#111}

@media print{
  .sb,.ilist,.ftr{display:none!important}
  .main{padding:0!important}
  body,html{height:auto;overflow:visible}
  .sp{height:auto}
  .cv{border:none}
}

/* Stage canvas: 4:3 landscape, bar-gig sized not arena */
.cv-w{
  flex:1;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.aud-label{
  font-family:'Caveat','Comic Sans MS',cursive;
  font-size:15px;
  color:rgba(240,210,180,0.7);
  transform:rotate(-1deg);
  letter-spacing:0.03em;
  flex-shrink:0;
  pointer-events:none;
  user-select:none;
}
.cv{
  width:100%;
  max-height:100%;
  aspect-ratio:4/3;
  max-width:min(calc(100vh - 130px) * 1.333, 640px);
  background:#fffef8;
  border:none;
  position:relative;
  overflow:hidden;
  box-shadow:4px 5px 18px rgba(30,0,0,0.45);
}

/* Mobile action bar — appears below footer when item selected on touch */
.mob-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(80,10,10,0.97);
  border-top:2px solid #5a0e0e;
  padding:8px 16px;
  gap:12px;
  justify-content:center;
  z-index:200;
  font-family:'Caveat','Comic Sans MS',cursive;
}
.mob-bar.vis{display:flex}
.mob-btn{
  font-family:'Caveat','Comic Sans MS',cursive;
  font-size:16px;padding:5px 18px;
  border:2px solid #c8a090;
  background:rgba(140,30,30,0.8);
  border-radius:3px;cursor:pointer;color:#f5ece0;
}
.mob-btn.danger{border-color:#e06050;color:#f0c0b0}
@media(hover:none){
  /* on touch devices always show delete handles */
  .idel{display:block!important}
}
.rotate-msg{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:rgba(180,160,120,0.97);
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;
  font-family:'Caveat','Comic Sans MS',cursive;
  font-size:22px;color:#2a1f0e;text-align:center;padding:32px;
}
.rotate-msg svg{opacity:0.6;animation:spin 2s ease-in-out infinite alternate}
@keyframes spin{from{transform:rotate(-20deg)}to{transform:rotate(20deg)}}
@media(orientation:portrait) and (max-width:768px){
  .rotate-msg{display:flex}
}

/* Narrow sidebars on small landscape screens */
@media(max-height:500px),(max-width:700px){
  .sb{width:82px}
  .ilist{width:120px}
  .pi-l{font-size:10px}
  .il-hd,.sb-hd{font-size:12px;padding:6px 4px}
  .main{padding:8px 6px 6px}
}
</style>
</head>
<body>

<!-- Portrait / rotate nudge (mobile only) -->
<div class="rotate-msg">
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="#2a1f0e" stroke-width="3" stroke-linecap="round">
    <rect x="18" y="8" width="28" height="48" rx="4"/>
    <path d="M8,26 C8,14 18,6 32,6" marker-end="url(#arr)"/>
    <polyline points="30,2 32,6 36,6"/>
  </svg>
  <div>Rotate your phone<br>for NapkinPlot</div>
</div>

<!-- Global rough filter + per-item rough filter -->
<svg style="width:0;height:0;overflow:hidden;position:absolute">
  <defs>
    <filter id="rough" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div class="sp">
  <!-- PALETTE -->
  <div class="sb">
    <div class="sb-hd">drag to<br>stage →</div>
    <div class="sb-bd" id="sb"></div>
  </div>

  <!-- STAGE -->
  <div class="main">
    <div class="hdr">
      <span class="hdr-t">NapkinPlot —</span>
      <input class="band" id="band" value="My Band">
    </div>
    <div class="cv-w">
      <div class="aud-label">audience</div>
      <div class="cv" id="cv">
        <svg class="sv" id="sv"></svg>
      </div>
    </div>
    <div class="ftr">
      <button class="btn" id="clr">clear stage</button>
      <button class="btn" onclick="window.print()">print</button>
      <span class="hint">dbl-click label to rename · del to remove</span>
    </div>
  </div>

  <!-- INPUT LIST -->
  <div class="ilist">
    <div class="il-hd">channel<br>list</div>
    <div class="il-bd" id="ibd"></div>
    <div class="il-ft">
      <button class="iadd" id="iadd">+ add channel</button>
    </div>
  </div>
</div>

<!-- Mobile action bar (shown when item selected on touch) -->
<div class="mob-bar" id="mob-bar">
  <button class="mob-btn" id="mob-rename">rename</button>
  <button class="mob-btn danger" id="mob-del">delete</button>
</div>

<script>
// ─── SVG ICONS ────────────────────────────────────────────────────────────────

// ─── PALETTE CONFIG ────────────────────────────────────────────────────────────
const PAL = [
  {t:'vocalist',  l:'Vocalist'},
  {t:'e_guitar',  l:'E. Guitar'},
  {t:'acoustic',  l:'Acoustic'},
  {t:'bass',      l:'Bass'},
  {t:'drums',     l:'Drums'},
  {t:'keys',      l:'Keys'},
  {t:'horn',      l:'Horn'},
  {t:'monitor',   l:'Monitor'},
  {t:'guitar_amp',l:'Guitar Amp'},
  {t:'bass_amp',  l:'Bass Amp'},
  {t:'di',        l:'DI Box'},
];

// Default inputs added to input list when item is dropped
const DEF_INPUTS = {
  vocalist:   [{name:'Vocals',   type:'Mic'}],
  e_guitar:   [{name:'E. Guitar',type:'DI'}],
  acoustic:   [{name:'Acoustic', type:'DI'}],
  bass:       [{name:'Bass',     type:'DI'}],
  drums:      [
    {name:'Kick',   type:'Mic'},
    {name:'Snare',  type:'Mic'},
    {name:'Hi-Hat', type:'Mic'},
    {name:'OH L',   type:'Mic'},
    {name:'OH R',   type:'Mic'},
  ],
  keys:       [{name:'Keys L',   type:'DI'},{name:'Keys R',type:'DI'}],
  guitar_amp: [{name:'Gtr Amp',  type:'Mic'}],
  bass_amp:   [{name:'Bass Amp', type:'Mic'}],
  di:         [{name:'DI',       type:'DI'}],
  horn:       [{name:'Horn',     type:'Mic'}],
  monitor:    [],
};

// ─── STATE ─────────────────────────────────────────────────────────────────────
let items=[], inputs=[], nid=1, nii=1, selId=null, editId=null, drag=null;
const cv  = document.getElementById('cv');
const sv  = document.getElementById('sv');
const sbEl= document.getElementById('sb');
const ibd = document.getElementById('ibd');

// ─── BUILD PALETTE ─────────────────────────────────────────────────────────────
PAL.forEach(p => {
  const d = document.createElement('div');
  d.className = 'pi';
  d.innerHTML = (IC[p.t]||'') + `<span class="pi-l">${p.l}</span>`;
  d.addEventListener('mousedown', e => {
    e.preventDefault();
    drag = {src:'pal', t:p.t};
    document.body.style.cursor = 'copy';
  });
  d.addEventListener('touchstart', e => {
    drag = {src:'pal', t:p.t, _cx:0, _cy:0};
  }, {passive:true});
  sbEl.appendChild(d);
});

// ─── INPUT LIST ────────────────────────────────────────────────────────────────
function renderInputs() {
  ibd.innerHTML = '';
  inputs.forEach((inp, i) => {
    const row = document.createElement('div');
    row.className = 'irow';
    const safe = (inp.name||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    row.innerHTML = `
      <span class="ich">${i+1}</span>
      <input class="iname" value="${safe}" data-id="${inp.id}" placeholder="Channel">
      <button class="ityp" data-id="${inp.id}">${inp.type}</button>
      <span class="idel" data-id="${inp.id}" title="remove">×</span>`;
    ibd.appendChild(row);

    row.querySelector('.iname').addEventListener('input', e => {
      const it = inputs.find(x => x.id == +e.target.dataset.id);
      if (it) it.name = e.target.value;
    });
    row.querySelector('.ityp').addEventListener('click', e => {
      const it = inputs.find(x => x.id == +e.target.dataset.id);
      if (!it) return;
      const c = ['Mic','DI','Line'];
      it.type = c[(c.indexOf(it.type)+1) % c.length];
      e.target.textContent = it.type;
    });
    row.querySelector('.idel').addEventListener('click', e => {
      inputs = inputs.filter(x => x.id != +e.target.dataset.id);
      renderInputs();
    });
  });
  // scroll to bottom when new rows added
  ibd.scrollTop = ibd.scrollHeight;
}

function addInputsFor(type) {
  (DEF_INPUTS[type]||[]).forEach(d => inputs.push({id:nii++, name:d.name, type:d.type}));
  renderInputs();
}

document.getElementById('iadd').addEventListener('click', () => {
  inputs.push({id:nii++, name:'Channel', type:'Mic'});
  renderInputs();
  setTimeout(() => {
    const rows = ibd.querySelectorAll('.iname');
    if (rows.length) rows[rows.length-1].focus();
  }, 10);
});

// ─── STAGE OVERLAY ─────────────────────────────────────────────────────────────
function drawStage() {
  const W = cv.offsetWidth, H = cv.offsetHeight;
  if (!W || !H) return;

  // Generate a dense irregular polygon around the perimeter.
  // Walk each edge with many small steps, randomly deviating inward/outward.
  // This gives a genuinely torn/hand-cut edge rather than a smooth bezier.
  function edgePoints(x0,y0,x1,y1, steps, jitter, seed) {
    const pts = [];
    let s = seed;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const bx = x0 + (x1-x0)*t;
      const by = y0 + (y1-y0)*t;
      // simple seeded pseudo-random
      s = (s * 1664525 + 1013904223) & 0xffffffff;
      const r = ((s >>> 0) / 0xffffffff - 0.5) * 2;
      // perpendicular to edge direction
      const dx = -(y1-y0), dy = (x1-x0);
      const len = Math.sqrt(dx*dx+dy*dy) || 1;
      pts.push([bx + (dx/len)*r*jitter, by + (dy/len)*r*jitter]);
    }
    return pts;
  }
  const j = 5, steps = 18;
  const top    = edgePoints(0,0,  W,0,  steps, j, 42);
  const right  = edgePoints(W,0,  W,H,  steps, j, 137);
  const bottom = edgePoints(W,H,  0,H,  steps, j, 251);
  const left   = edgePoints(0,H,  0,0,  steps, j, 89);
  const all = [...top, ...right.slice(1), ...bottom.slice(1), ...left.slice(1)];
  const clipD = all.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ') + ' Z';

  cv.style.clipPath = `path('${clipD}')`;

  // Vertical fold crease only
  const vfold = `M ${W*.5+2},0 C ${W*.5-4},${H*.18} ${W*.5+5},${H*.42} ${W*.5-3},${H*.65} C ${W*.5+4},${H*.82} ${W*.5-1},${H*.93} ${W*.5+1},${H}`;

  sv.innerHTML = `
  <defs>
    <filter id="rf2" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- vertical fold crease -->
  <g filter="url(#rf2)" opacity="0.3">
    <path d="${vfold}" fill="none" stroke="#4a3a22" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <text x="${W/2}" y="${H - 10}" text-anchor="middle"
        font-family="'Caveat','Comic Sans MS',cursive" font-size="12" fill="#ccc">upstage</text>
  <text x="${W*.03}" y="${H*.52}" text-anchor="middle"
        font-family="'Caveat','Comic Sans MS',cursive" font-size="11" fill="#ccc"
        transform="rotate(-90,${W*.03},${H*.52})">SR</text>
  <text x="${W*.97}" y="${H*.52}" text-anchor="middle"
        font-family="'Caveat','Comic Sans MS',cursive" font-size="11" fill="#ccc"
        transform="rotate(90,${W*.97},${H*.52})">SL</text>`;
}

// ─── RENDER STAGE ITEMS ────────────────────────────────────────────────────────
function render() {
  cv.querySelectorAll('.it').forEach(el => el.remove());
  items.forEach(it => {
    const d = document.createElement('div');
    d.className = 'it' + (it.id===selId ? ' s' : '');
    d.dataset.id = it.id;
    d.style.cssText = `left:${it.x}px;top:${it.y}px`;
    d.innerHTML = IC[it.t] || IC.di;

    if (editId === it.id) {
      const inp = document.createElement('input');
      inp.className = 'it-in';
      inp.value = it.l;
      inp.addEventListener('blur', () => { it.l = inp.value; editId = null; render(); });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { it.l = inp.value; editId = null; render(); }
        e.stopPropagation();
      });
      ['click','mousedown','dblclick'].forEach(ev => inp.addEventListener(ev, e => e.stopPropagation()));
      d.appendChild(inp);
      setTimeout(() => inp.focus(), 10);
    } else {
      const lbl = document.createElement('span');
      lbl.className = 'it-l';
      lbl.textContent = it.l;
      d.appendChild(lbl);
    }

    d.addEventListener('mousedown', e => onItemStart(e, it));
    d.addEventListener('touchstart', e => onItemStart(e, it), {passive:false});
    d.addEventListener('dblclick', e => { e.stopPropagation(); editId = it.id; render(); });
    d.addEventListener('click',    e => { e.stopPropagation(); selId = it.id; updateMobBar(); render(); });
    cv.appendChild(d);
  });
}

// ─── UNIFIED POINTER HELPERS ──────────────────────────────────────────────────
// Extract clientX/Y from either a mouse or touch event
function exy(e) {
  if (e.touches && e.touches.length) return {x: e.touches[0].clientX, y: e.touches[0].clientY};
  if (e.changedTouches && e.changedTouches.length) return {x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY};
  return {x: e.clientX, y: e.clientY};
}

const isTouch = () => window.matchMedia('(hover:none)').matches;

// Mobile bar
const mobBar   = document.getElementById('mob-bar');
const mobRename= document.getElementById('mob-rename');
const mobDel   = document.getElementById('mob-del');
function updateMobBar() {
  if (selId !== null && isTouch()) mobBar.classList.add('vis');
  else mobBar.classList.remove('vis');
}
mobRename.addEventListener('click', () => { if (selId!==null){editId=selId; render();} });
mobDel.addEventListener('click', () => {
  if (selId===null) return;
  items = items.filter(x => x.id !== selId);
  selId = null; mobBar.classList.remove('vis'); render();
});

// ─── DRAG ──────────────────────────────────────────────────────────────────────
// Double-tap detection for rename
let lastTap = 0;

function onItemStart(e, it) {
  e.stopPropagation();
  // double-tap = rename
  const now = Date.now();
  if (now - lastTap < 300) { editId = it.id; lastTap = 0; render(); return; }
  lastTap = now;
  const {x,y} = exy(e);
  // Update selection without re-rendering (re-render destroys the element being dragged)
  if (selId !== it.id) {
    cv.querySelectorAll('.it.s').forEach(el => el.classList.remove('s'));
    e.currentTarget.classList.add('s');
    selId = it.id;
  }
  drag = {src:'cv', id:it.id, sx:x, sy:y, ox:it.x, oy:it.y};
  updateMobBar();
}

function onMove(e) {
  if (!drag) return;
  if (e.cancelable) e.preventDefault();
  const {x,y} = exy(e);
  if (drag.src === 'cv') {
    const it = items.find(i => i.id === drag.id);
    if (it) {
      it.x = drag.ox + (x - drag.sx);
      it.y = drag.oy + (y - drag.sy);
      const el = cv.querySelector(`.it[data-id="${drag.id}"]`);
      if (el) { el.style.left = it.x+'px'; el.style.top = it.y+'px'; }
    }
  } else if (drag.src === 'pal') {
    // show ghost position during touch-drag from palette
    drag._cx = x; drag._cy = y;
  }
}

function onEnd(e) {
  if (!drag) return;
  const d = drag; drag = null;
  document.body.style.cursor = '';
  const {x,y} = exy(e);
  if (d.src === 'pal') {
    const cx = d._cx ?? x, cy = d._cy ?? y;
    const r = cv.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
      const pal = PAL.find(p => p.t === d.t);
      const ni = {
        id: nid++, t: d.t, l: pal?.l || d.t,
        x: Math.max(4, Math.min(cx - r.left - 22, r.width  - 90)),
        y: Math.max(4, Math.min(cy - r.top  - 22, r.height - 80)),
      };
      items.push(ni); selId = ni.id;
      addInputsFor(d.t);
      updateMobBar();
    }
  }
  render();
}

// Mouse events
document.addEventListener('mousemove', onMove);
document.addEventListener('mouseup',   onEnd);
// Touch events
document.addEventListener('touchmove', onMove, {passive:false});
document.addEventListener('touchend',  onEnd);
document.addEventListener('touchcancel', () => { drag = null; });

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (editId !== null) return;
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && selId !== null) {
    e.preventDefault();
    items = items.filter(x => x.id !== selId);
    selId = null; render();
  }
});

// ─── MISC ──────────────────────────────────────────────────────────────────────
cv.addEventListener('click', () => {
  if (editId === null) { selId = null; updateMobBar(); render(); }
});

document.getElementById('clr').addEventListener('click', () => {
  items = []; selId = null; editId = null; mobBar.classList.remove('vis'); render();
});

new ResizeObserver(() => drawStage()).observe(cv);
drawStage();
render();
renderInputs();
</script>
